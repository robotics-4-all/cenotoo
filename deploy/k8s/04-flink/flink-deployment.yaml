apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: cenotoo-flink
  labels:
    app.kubernetes.io/part-of: cenotoo
spec:
  image: "custom-flink-image:latest"
  imagePullPolicy: IfNotPresent
  flinkVersion: v1_18
  mode: native
  serviceAccount: flink
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "4"
    state.savepoints.dir: file:///flink-data/savepoints
    state.checkpoints.dir: file:///flink-data/checkpoints
    high-availability.type: kubernetes
    high-availability.storageDir: file:///flink-data/ha
    sql-gateway.endpoint.rest.address: "0.0.0.0"
    sql-gateway.endpoint.rest.port: "8083"
  jobManager:
    replicas: 1
    resource:
      cpu: "1"
      memory: "2048m"
    podTemplate:
      spec:
        containers:
          - name: flink-main-container
            volumeMounts:
              - name: flink-data
                mountPath: /flink-data
          - name: sql-gateway
            image: "custom-flink-image:latest"
            imagePullPolicy: IfNotPresent
            command: ["/opt/flink/bin/sql-gateway.sh", "start-foreground"]
            env:
              - name: FLINK_CONF_DIR
                value: /opt/flink/conf
            ports:
              - name: sql-gateway
                containerPort: 8083
                protocol: TCP
            volumeMounts:
              - name: flink-data
                mountPath: /flink-data
              - name: flink-config-volume
                mountPath: /opt/flink/conf
            readinessProbe:
              httpGet:
                path: /v1/info
                port: 8083
              initialDelaySeconds: 10
              periodSeconds: 5
            resources:
              requests:
                cpu: "0.25"
                memory: "512Mi"
              limits:
                cpu: "0.5"
                memory: "1024Mi"
        volumes:
          - name: flink-data
            persistentVolumeClaim:
              claimName: cenotoo-flink-data
  taskManager:
    replicas: 2
    resource:
      cpu: "2"
      memory: "4096m"
    podTemplate:
      spec:
        containers:
          - name: flink-main-container
            volumeMounts:
              - name: flink-data
                mountPath: /flink-data
        volumes:
          - name: flink-data
            persistentVolumeClaim:
              claimName: cenotoo-flink-data
