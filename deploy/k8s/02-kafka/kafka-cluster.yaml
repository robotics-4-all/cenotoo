apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: cenotoo-controller
  labels:
    strimzi.io/cluster: cenotoo-kafka
    app.kubernetes.io/part-of: cenotoo
spec:
  replicas: 3
  roles:
    - controller
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 10Gi
        class: local-path
        deleteClaim: false
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1"
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: cenotoo-broker
  labels:
    strimzi.io/cluster: cenotoo-kafka
    app.kubernetes.io/part-of: cenotoo
spec:
  replicas: 2
  roles:
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 10Gi
        class: local-path
        deleteClaim: false
  resources:
    requests:
      memory: "2Gi"
      cpu: "1"
    limits:
      memory: "4Gi"
      cpu: "2"
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: cenotoo-kafka
  labels:
    app.kubernetes.io/part-of: cenotoo
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: "4.2.0"
    metadataVersion: "4.2-IV1"
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
        authentication:
          type: scram-sha-512
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: scram-sha-512
    config:
      offsets.topic.replication.factor: 2
      transaction.state.log.replication.factor: 2
      transaction.state.log.min.isr: 1
      default.replication.factor: 2
      min.insync.replicas: 1
      log.retention.hours: 168
      log.retention.bytes: -1
    authorization:
      type: simple
  entityOperator:
    topicOperator: {}
    userOperator: {}
