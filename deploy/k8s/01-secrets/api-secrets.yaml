# Cenotoo API secrets.
# Override in production via sealed-secrets or external-secrets.
apiVersion: v1
kind: Secret
metadata:
  name: cenotoo-api-secrets
  labels:
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cenotoo
type: Opaque
data:
  # "supersecretkey" base64-encoded — CHANGE IN PRODUCTION
  jwt-secret-key: c3VwZXJzZWNyZXRrZXk=
  # "default-api-key-secret" base64-encoded — CHANGE IN PRODUCTION
  api-key-secret: ZGVmYXVsdC1hcGkta2V5LXNlY3JldA==
  # "admin" base64-encoded
  admin-username: YWRtaW4=
  # "admin" base64-encoded — CHANGE IN PRODUCTION
  admin-password: YWRtaW4=
