apiVersion: apps/v1
kind: Deployment
metadata:
  name: cenotoo-cassandra-writer
  labels:
    app.kubernetes.io/component: cassandra-writer
    app.kubernetes.io/part-of: cenotoo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: cassandra-writer
      app.kubernetes.io/part-of: cenotoo
  template:
    metadata:
      labels:
        app.kubernetes.io/component: cassandra-writer
        app.kubernetes.io/part-of: cenotoo
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: cassandra-writer
          image: kafka-cassandra-consumer:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: cenotoo-kafka-kafka-bootstrap:9092
            - name: CASSANDRA_CONTACT_POINTS
              value: cenotoo-cassandra
            - name: CASSANDRA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cenotoo-cassandra-superuser
                  key: username
            - name: CASSANDRA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cenotoo-cassandra-superuser
                  key: password
          volumeMounts:
            - name: consumer-src
              mountPath: /app/consumer.py
              subPath: consumer.py
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: consumer-src
          configMap:
            name: cenotoo-consumer-py
