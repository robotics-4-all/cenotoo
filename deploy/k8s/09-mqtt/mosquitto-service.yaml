apiVersion: v1
kind: Service
metadata:
  name: cenotoo-mosquitto
  labels:
    app.kubernetes.io/component: mqtt-broker
    app.kubernetes.io/part-of: cenotoo
spec:
  selector:
    app.kubernetes.io/component: mqtt-broker
    app.kubernetes.io/part-of: cenotoo
  ports:
    - name: mqtt
      port: 1883
      targetPort: 1883
  type: ClusterIP
