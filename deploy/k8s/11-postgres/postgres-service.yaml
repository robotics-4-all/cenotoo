apiVersion: v1
kind: Service
metadata:
  name: cenotoo-postgres
  namespace: cenotoo
  labels:
    app.kubernetes.io/component: postgres
    app.kubernetes.io/part-of: cenotoo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: postgres
    app.kubernetes.io/part-of: cenotoo
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
