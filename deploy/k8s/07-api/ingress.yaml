apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cenotoo-api
  labels:
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cenotoo
  annotations:
    cert-manager.io/cluster-issuer: cenotoo-letsencrypt
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.cenotoo.issel-portal.com
      secretName: cenotoo-api-tls
  rules:
    - host: api.cenotoo.issel-portal.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cenotoo-api
                port:
                  name: http
