{{- if and .Values.monitoring.enabled .Values.monitoring.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "eco-ready.fullname" . }}-grafana-overview
  labels:
    {{- include "eco-ready.labels" . | nindent 4 }}
    {{ .Values.monitoring.grafana.sidecarLabel }}: {{ .Values.monitoring.grafana.sidecarLabelValue | quote }}
data:
  eco-ready-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Kafka - Messages In Per Second",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [{"expr": "sum(rate(kafka_server_brokertopicmetrics_messagesin_total[5m]))", "legendFormat": "Messages/s"}],
          "fieldConfig": {"defaults": {"unit": "ops"}}
        },
        {
          "title": "Kafka - Consumer Group Lag",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [{"expr": "sum by (consumergroup, topic) (kafka_consumergroup_lag_sum)", "legendFormat": "{{ "{{" }}consumergroup{{ "}}" }} / {{ "{{" }}topic{{ "}}" }}"}],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "Kafka - Under Replicated Partitions",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 8},
          "targets": [{"expr": "sum(kafka_server_replicamanager_underreplicatedpartitions)"}],
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}}
        },
        {
          "title": "Kafka - Active Brokers",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 8},
          "targets": [{"expr": "count(kafka_server_kafkaserver_brokerstate)"}],
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "red", "value": null}, {"color": "green", "value": 2}]}}}
        },
        {
          "title": "Flink - Running Jobs",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 8},
          "targets": [{"expr": "flink_jobmanager_numRunningJobs"}],
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "title": "Flink - Registered TaskManagers",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 8},
          "targets": [{"expr": "flink_jobmanager_numRegisteredTaskManagers"}],
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "title": "Flink - Checkpoint Duration",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [{"expr": "flink_jobmanager_job_lastCheckpointDuration", "legendFormat": "{{ "{{" }}job_name{{ "}}" }}"}],
          "fieldConfig": {"defaults": {"unit": "ms"}}
        },
        {
          "title": "Cassandra - Node Status",
          "type": "stat",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [{"expr": "count(up{job=~\".*cassandra.*\"} == 1)", "legendFormat": "Nodes Up"}],
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "red", "value": null}, {"color": "green", "value": 2}]}}}
        }
      ],
      "schemaVersion": 39,
      "tags": ["eco-ready", "kafka", "cassandra", "flink"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "title": "ECO-READY Overview",
      "uid": "eco-ready-overview"
    }
{{- end }}
