apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: {{ include "eco-ready.fullname" . }}-consumer
  labels:
    strimzi.io/cluster: {{ include "eco-ready.fullname" . }}-kafka
    {{- include "eco-ready.labels" . | nindent 4 }}
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
      # Read from all topics matching org.project.* pattern
      - resource:
          type: topic
          name: "*"
          patternType: literal
        operations:
          - Read
          - Describe
        host: "*"
      # Consumer group access
      - resource:
          type: group
          name: "*"
          patternType: literal
        operations:
          - Read
          - Describe
        host: "*"
      # Write access for producers
      - resource:
          type: topic
          name: "*"
          patternType: literal
        operations:
          - Write
          - Create
          - Describe
        host: "*"
