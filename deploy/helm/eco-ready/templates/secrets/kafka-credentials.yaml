apiVersion: v1
kind: Secret
metadata:
  name: {{ include "eco-ready.fullname" . }}-kafka-credentials
  labels:
    {{- include "eco-ready.labels" . | nindent 4 }}
type: Opaque
data:
  # Base64-encoded credentials — override in production via sealed-secrets or external-secrets
  username: {{ "eco-ready" | b64enc | quote }}
  password: {{ "changeme" | b64enc | quote }}
