nameOverride: ""
fullnameOverride: ""

kafka:
  version: "3.7.0"
  metadataVersion: "3.7-IV4"
  replicas: 2
  storage:
    size: 10Gi
    storageClassName: standard
  controller:
    replicas: 3
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1"
  broker:
    resources:
      requests:
        memory: "2Gi"
        cpu: "1"
      limits:
        memory: "4Gi"
        cpu: "2"
  config:
    offsetsTopicReplicationFactor: 2
    transactionStateLogReplicationFactor: 2
    transactionStateLogMinIsr: 1
    defaultReplicationFactor: 2
    minInsyncReplicas: 1

cassandra:
  version: "4.1.3"
  datacenterName: dc1
  size: 2
  storage:
    size: 10Gi
    storageClassName: standard
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

flink:
  image:
    repository: custom-flink-image
    tag: latest
    pullPolicy: IfNotPresent
  jobManager:
    replicas: 1
    cpu: "1"
    memory: "2048m"
  taskManager:
    replicas: 2
    cpu: "2"
    memory: "4096m"
    taskSlots: 4
  storage:
    size: 5Gi
    storageClassName: standard

consumers:
  cassandraWriter:
    replicas: 1
    image:
      repository: kafka-cassandra-consumer
      tag: latest
      pullPolicy: IfNotPresent
    env:
      collectionName: ""
      projectName: ""
      organizationName: ""
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  liveConsumer:
    replicas: 1
    image:
      repository: kafka-live-consumer
      tag: latest
      pullPolicy: IfNotPresent
    env:
      collectionName: ""
      projectName: ""
      organizationName: ""
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
