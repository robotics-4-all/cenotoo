kafka:
  replicas: 3
  controller:
    replicas: 3
  storage:
    size: 50Gi
  broker:
    resources:
      requests:
        memory: "4Gi"
        cpu: "2"
      limits:
        memory: "8Gi"
        cpu: "4"
  config:
    logRetentionHours: 168
    logRetentionBytes: 107374182400

cassandra:
  size: 3
  storage:
    size: 50Gi
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

flink:
  jobManager:
    cpu: "2"
    memory: "4096m"
  taskManager:
    replicas: 3
    cpu: "4"
    memory: "8192m"
    taskSlots: 8
  storage:
    size: 20Gi

monitoring:
  enabled: true
  scrapeInterval: 15s
  alerts:
    enabled: true
  grafana:
    enabled: true

backup:
  medusa:
    enabled: true
    storageProperties:
      storageProvider: s3_compatible
      bucketName: cenotoo-backups
      storageSecretRef:
        name: medusa-bucket-key
      prefix: production
      maxBackupCount: 14
