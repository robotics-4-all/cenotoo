nameOverride: ""
fullnameOverride: ""

kafka:
  version: "4.2.0"
  metadataVersion: "4.2-IV1"
  replicas: 2
  storage:
    size: 10Gi
    storageClassName: standard
  controller:
    replicas: 3
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1"
  broker:
    resources:
      requests:
        memory: "2Gi"
        cpu: "1"
      limits:
        memory: "4Gi"
        cpu: "2"
  config:
    offsetsTopicReplicationFactor: 2
    transactionStateLogReplicationFactor: 2
    transactionStateLogMinIsr: 1
    defaultReplicationFactor: 2
    minInsyncReplicas: 1
    logRetentionHours: 168
    logRetentionBytes: -1

cassandra:
  version: "4.1.3"
  datacenterName: dc1
  size: 2
  replication:
    class: NetworkTopologyStrategy
  heap:
    size: "1024M"
    newGenSize: "256M"
  storage:
    size: 10Gi
    storageClassName: standard
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "10Gi"

flink:
  image:
    repository: custom-flink-image
    tag: latest
    pullPolicy: IfNotPresent
  jobManager:
    replicas: 1
    cpu: "1"
    memory: "2048m"
  taskManager:
    replicas: 2
    cpu: "2"
    memory: "4096m"
    taskSlots: 4
  storage:
    size: 5Gi
    storageClassName: standard

consumers:
  cassandraWriter:
    replicas: 1
    image:
      repository: kafka-cassandra-consumer
      tag: latest
      pullPolicy: IfNotPresent
    env:
      collectionName: ""
      projectName: ""
      organizationName: ""
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  liveConsumer:
    replicas: 1
    image:
      repository: kafka-live-consumer
      tag: latest
      pullPolicy: IfNotPresent
    env:
      collectionName: ""
      projectName: ""
      organizationName: ""
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

backup:
  medusa:
    enabled: false
    storageProperties:
      storageProvider: s3_compatible
      bucketName: ""
      storageSecretRef:
        name: ""
      prefix: ""
      maxBackupCount: 7

# -- Monitoring and observability configuration
# Requires kube-prometheus-stack (Prometheus Operator) installed in the cluster
monitoring:
  # -- Enable/disable all monitoring resources (PodMonitors, PrometheusRules, dashboards)
  enabled: true

  # -- Prometheus scrape interval for all monitors
  scrapeInterval: 30s

  kafka:
    # -- Enable Kafka JMX metrics via Strimzi metricsConfig
    metricsEnabled: true
    # -- Enable Strimzi KafkaExporter for consumer group lag metrics
    kafkaExporterEnabled: true
    # -- Topic regex for KafkaExporter
    topicRegex: ".*"
    # -- Consumer group regex for KafkaExporter
    groupRegex: ".*"

  cassandra:
    # -- Enable Cassandra metrics endpoint (Management API, port 9103)
    metricsEnabled: true
    # -- Disable legacy MCAC (deprecated, replaced by Management API endpoint)
    mcacEnabled: false

  flink:
    # -- Enable Flink Prometheus metrics reporter
    metricsEnabled: true
    # -- Port range for Prometheus reporter
    metricsPortRange: "9249-9250"

  # -- Alerting rules configuration
  alerts:
    # -- Enable PrometheusRule resources
    enabled: true
    # -- Labels to add to PrometheusRule resources (for Prometheus Operator discovery)
    labels: {}

  # -- Grafana dashboard configuration
  grafana:
    # -- Enable Grafana dashboard ConfigMaps
    enabled: true
    # -- Label for Grafana sidecar dashboard discovery
    sidecarLabel: grafana_dashboard
    # -- Label value for Grafana sidecar dashboard discovery
    sidecarLabelValue: "1"
