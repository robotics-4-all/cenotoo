apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cenotoo.fullname" . }}-cassandra-superuser
  labels:
    {{- include "cenotoo.labels" . | nindent 4 }}
type: Opaque
data:
  # Base64-encoded credentials — override in production via sealed-secrets or external-secrets
  username: {{ "cassandra" | b64enc | quote }}
  password: {{ "cassandra" | b64enc | quote }}
