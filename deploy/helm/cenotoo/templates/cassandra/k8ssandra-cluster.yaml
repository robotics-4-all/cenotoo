apiVersion: k8ssandra.io/v1alpha1
kind: K8ssandraCluster
metadata:
  name: {{ include "cenotoo.fullname" . }}-cassandra
  labels:
    {{- include "cenotoo.labels" . | nindent 4 }}
spec:
  auth: true
  {{- if .Values.backup.medusa.enabled }}
  medusa:
    storageProperties:
      storageProvider: {{ .Values.backup.medusa.storageProperties.storageProvider }}
      bucketName: {{ .Values.backup.medusa.storageProperties.bucketName }}
      storageSecretRef:
        name: {{ .Values.backup.medusa.storageProperties.storageSecretRef.name }}
      prefix: {{ .Values.backup.medusa.storageProperties.prefix }}
      maxBackupCount: {{ .Values.backup.medusa.storageProperties.maxBackupCount }}
  {{- end }}
  cassandra:
    serverVersion: {{ .Values.cassandra.version | quote }}
    superuserSecretRef:
      name: {{ include "cenotoo.fullname" . }}-cassandra-superuser
    # auth: true (above) handles authenticator/authorizer automatically.
    # K8ssandra operator bootstraps with AllowAllAuthenticator first,
    # creates the superuser, then switches to PasswordAuthenticator.
    # Do NOT set authenticator/authorizer in cassandraYaml — it conflicts
    # with the operator's bootstrap workflow.
    {{- if and .Values.monitoring.enabled .Values.monitoring.cassandra.metricsEnabled }}
    telemetry:
      mcac:
        enabled: {{ .Values.monitoring.cassandra.mcacEnabled }}
    {{- end }}
    datacenters:
      - metadata:
          name: {{ .Values.cassandra.datacenterName }}
        size: {{ .Values.cassandra.size }}
        storageConfig:
          cassandraDataVolumeClaimSpec:
            {{- if .Values.cassandra.storage.storageClassName }}
            storageClassName: {{ .Values.cassandra.storage.storageClassName }}
            {{- end }}
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: {{ .Values.cassandra.storage.size }}
        resources:
          {{- toYaml .Values.cassandra.resources | nindent 10 }}
    networking:
      hostNetwork: false
