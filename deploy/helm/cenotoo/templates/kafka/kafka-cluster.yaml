apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: {{ include "cenotoo.fullname" . }}-controller
  labels:
    strimzi.io/cluster: {{ include "cenotoo.fullname" . }}-kafka
    {{- include "cenotoo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.kafka.controller.replicas }}
  roles:
    - controller
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: {{ .Values.kafka.storage.size }}
        {{- if .Values.kafka.storage.storageClassName }}
        class: {{ .Values.kafka.storage.storageClassName }}
        {{- end }}
        deleteClaim: false
  resources:
    {{- toYaml .Values.kafka.controller.resources | nindent 4 }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: {{ include "cenotoo.fullname" . }}-broker
  labels:
    strimzi.io/cluster: {{ include "cenotoo.fullname" . }}-kafka
    {{- include "cenotoo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.kafka.replicas }}
  roles:
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: {{ .Values.kafka.storage.size }}
        {{- if .Values.kafka.storage.storageClassName }}
        class: {{ .Values.kafka.storage.storageClassName }}
        {{- end }}
        deleteClaim: false
  resources:
    {{- toYaml .Values.kafka.broker.resources | nindent 4 }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: {{ include "cenotoo.fullname" . }}-kafka
  labels:
    {{- include "cenotoo.labels" . | nindent 4 }}
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: {{ .Values.kafka.version | quote }}
    metadataVersion: {{ .Values.kafka.metadataVersion | quote }}
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: scram-sha-512
    config:
      offsets.topic.replication.factor: {{ .Values.kafka.config.offsetsTopicReplicationFactor }}
      transaction.state.log.replication.factor: {{ .Values.kafka.config.transactionStateLogReplicationFactor }}
      transaction.state.log.min.isr: {{ .Values.kafka.config.transactionStateLogMinIsr }}
      default.replication.factor: {{ .Values.kafka.config.defaultReplicationFactor }}
      min.insync.replicas: {{ .Values.kafka.config.minInsyncReplicas }}
      log.retention.hours: {{ .Values.kafka.config.logRetentionHours }}
      log.retention.bytes: {{ int64 .Values.kafka.config.logRetentionBytes }}
      inter.broker.protocol.version: {{ .Values.kafka.metadataVersion | quote }}
    authorization:
      type: simple
    {{- if and .Values.monitoring.enabled .Values.monitoring.kafka.metricsEnabled }}
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: {{ include "cenotoo.fullname" . }}-kafka-metrics
          key: kafka-metrics-config.yml
    {{- end }}
  entityOperator:
    topicOperator: {}
    userOperator: {}
  {{- if and .Values.monitoring.enabled .Values.monitoring.kafka.kafkaExporterEnabled }}
  kafkaExporter:
    topicRegex: {{ .Values.monitoring.kafka.topicRegex | quote }}
    groupRegex: {{ .Values.monitoring.kafka.groupRegex | quote }}
  {{- end }}
