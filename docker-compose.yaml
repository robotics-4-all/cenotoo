services:
  # Kafka broker on the first node
  kafka1:
    image: confluentinc/cp-kafka:latest
    hostname: kafka1
    container_name: kafka1
    restart: always
    ports:
      - "59092:59092"  # External listener for client connections
      - "29093:29093"  # Controller listener
      - "19092:19092"  # Internal broker-to-broker listener
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,BROKER:PLAINTEXT,EXTERNAL:SASL_PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'BROKER://${KAFKA_BROKER1_IP}:19092,EXTERNAL://${KAFKA_BROKER1_IP}:59092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@${KAFKA_BROKER1_IP}:29093,2@${KAFKA_BROKER2_IP}:29094'
      KAFKA_LISTENERS: 'BROKER://0.0.0.0:19092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:59092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'BROKER'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: '${KAFKA_CLUSTER_ID}'  # Cluster ID generated externally
      KAFKA_SUPER_USERS: User:Admin
    volumes:
      - ./kafka/kafka.jaas.conf:/etc/kafka/configs/kafka_server_jaas.conf
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:19092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Kafka broker on the second node
  kafka2:
    image: confluentinc/cp-kafka:latest
    hostname: kafka2
    container_name: kafka2
    restart: always
    ports:
      - "59192:59092"  # External listener for client connections
      - "29094:29094"  # Controller listener
      - "19093:19093"  # Internal broker-to-broker listener
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_ADVERTISED_LISTENERS: 'BROKER://${KAFKA_BROKER2_IP}:19093,EXTERNAL://${KAFKA_BROKER2_IP}:59192'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@${KAFKA_BROKER1_IP}:29093,2@${KAFKA_BROKER2_IP}:29094'
      CLUSTER_ID: '${KAFKA_CLUSTER_ID}'
      KAFKA_SUPER_USERS: User:Admin
    volumes:
      - ./kafka/kafka.jaas.conf:/etc/kafka/configs/kafka_server_jaas.conf
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:19093 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Cassandra instance on the first node
  cassandra1:
    image: cassandra:4.1.0
    container_name: cassandra1
    restart: always
    ports:
      - '9042:9042'  # Default Cassandra CQL port
      - '7000:7000'  # Inter-node communication
    environment:
      CASSANDRA_CLUSTER_NAME: MyCassandraCluster
      CASSANDRA_SEEDS: ${CASSANDRA_SEEDS}
      CASSANDRA_BROADCAST_ADDRESS: ${CASSANDRA_BROADCAST_ADDRESS1}
      CASSANDRA_LISTEN_ADDRESS: cassandra1
      CASSANDRA_AUTHENTICATOR: PasswordAuthenticator
      CASSANDRA_AUTHORIZER: CassandraAuthorizer
    volumes:
      - ./cassandra1_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -u ${CASSANDRA_USERNAME:-cassandra} -p ${CASSANDRA_PASSWORD:-cassandra} -e 'SELECT now() FROM system.local' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Cassandra instance on the second node
  cassandra2:
    image: cassandra:4.1.0
    container_name: cassandra2
    restart: always
    depends_on:
      cassandra1:
        condition: service_healthy
    ports:
      - '9142:9042'  # Default Cassandra CQL port for second node
      - '7100:7000'  # Inter-node communication for second node
    environment:
      CASSANDRA_CLUSTER_NAME: MyCassandraCluster
      CASSANDRA_SEEDS: ${CASSANDRA_SEEDS}
      CASSANDRA_BROADCAST_ADDRESS: ${CASSANDRA_BROADCAST_ADDRESS2}
      CASSANDRA_LISTEN_ADDRESS: cassandra2
      CASSANDRA_AUTHENTICATOR: PasswordAuthenticator
      CASSANDRA_AUTHORIZER: CassandraAuthorizer
    volumes:
      - ./cassandra2_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -u ${CASSANDRA_USERNAME:-cassandra} -p ${CASSANDRA_PASSWORD:-cassandra} -e 'SELECT now() FROM system.local' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Flink JobManager
  jobmanager:
    image: custom-flink-image
    container_name: jobmanager
    restart: always
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 8
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/savepoints
    volumes:
      - flink-data:/opt/flink/checkpoints
      - flink-savepoints:/opt/flink/savepoints
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/overview || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Flink TaskManager
  taskmanager:
    image: custom-flink-image
    container_name: taskmanager
    restart: always
    depends_on:
      jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 8
    volumes:
      - flink-data:/opt/flink/checkpoints
      - flink-savepoints:/opt/flink/savepoints

  mqtt-auth:
    image: mqtt-auth:latest
    container_name: mqtt-auth
    restart: always
    depends_on:
      cassandra1:
        condition: service_healthy
    environment:
      CASSANDRA_CONTACT_POINTS: cassandra1
      CASSANDRA_PORT: 9042
      CASSANDRA_USERNAME: ${CASSANDRA_USERNAME:-cassandra}
      CASSANDRA_PASSWORD: ${CASSANDRA_PASSWORD:-cassandra}
      ORGANIZATION_ID: ${ORGANIZATION_ID:-}
      MQTT_BRIDGE_USERNAME: ${MQTT_BRIDGE_USERNAME:-cenotoo-bridge}
      MQTT_BRIDGE_PASSWORD: ${MQTT_BRIDGE_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mosquitto:
    image: iegomez/mosquitto-go-auth:latest
    container_name: mosquitto
    restart: always
    depends_on:
      mqtt-auth:
        condition: service_healthy
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/etc/mosquitto/conf.d/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -t '$$SYS/#' -C 1 --quiet -u ${MQTT_BRIDGE_USERNAME:-cenotoo-bridge} -P ${MQTT_BRIDGE_PASSWORD:-} 2>/dev/null || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mqtt-bridge:
    image: mqtt-bridge:latest
    container_name: mqtt-bridge
    restart: always
    depends_on:
      mosquitto:
        condition: service_healthy
      kafka1:
        condition: service_healthy
    environment:
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      MQTT_USERNAME: ${MQTT_BRIDGE_USERNAME:-cenotoo-bridge}
      MQTT_PASSWORD: ${MQTT_BRIDGE_PASSWORD:-}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-cenotoo-bridge}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BROKER1_IP}:59092,${KAFKA_BROKER2_IP}:59192
      KAFKA_USERNAME: ${KAFKA_USERNAME}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-PLAIN}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-SASL_PLAINTEXT}

volumes:
  flink-data: {}
  flink-savepoints: {}
  mosquitto_data: {}
