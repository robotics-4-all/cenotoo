# =============================================================================
# Mosquitto MQTT Broker — Development Configuration (mosquitto-go-auth)
#
# Auth is handled via mosquitto-go-auth HTTP backend pointing to cenotoo-api.
# Devices authenticate with:
#   username = project UUID
#   password = write/master API key (64-char hex)
#
# The bridge service account uses:
#   username = cenotoo-bridge (MQTT_BRIDGE_USERNAME)
#   password = MQTT_BRIDGE_PASSWORD
#
# For local dev without cenotoo-api running, comment out the auth_plugin
# block and set: allow_anonymous true
# =============================================================================

listener 1883

# --------------------------------------------------------------------------
# mosquitto-go-auth HTTP backend
# Points to cenotoo-api running on the Docker Compose network.
# --------------------------------------------------------------------------
auth_plugin /mosquitto/go-auth.so

auth_opt_backends http
auth_opt_cache true
auth_opt_auth_cache_seconds 30
auth_opt_acl_cache_seconds 30

auth_opt_http_host mqtt-auth
auth_opt_http_port 8080
auth_opt_http_getuser_uri /auth/user
auth_opt_http_aclcheck_uri /auth/acl
auth_opt_http_response_mode status
auth_opt_http_params_mode json

# --------------------------------------------------------------------------
# Persistence
# --------------------------------------------------------------------------
persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type all
