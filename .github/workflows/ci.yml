name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install dependencies
        run: |
          pip install mypy
          pip install -r requirements.txt
          pip install -r kafka-to-cassandra/requirements.txt
          pip install -r kafka-live-consumer/requirements.txt

      - name: Mypy
        run: mypy kafka-to-cassandra/ kafka-live-consumer/ cassandra/ scripts/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install dependencies
        run: |
          pip install pytest pytest-mock
          pip install -r requirements.txt
          pip install -r kafka-to-cassandra/requirements.txt
          pip install -r kafka-live-consumer/requirements.txt

      - name: Run tests
        run: pytest tests/
